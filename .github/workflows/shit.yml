name: Cloud-Android-Phone-Access
on: workflow_dispatch

jobs:
  android-box:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-android --reset

      - name: Setup BinderFS and Launch Android
        run: |
          # 1. Create a mount point for the modern Binder system (This avoids modprobe errors)
          sudo mkdir -p /dev/binderfs
          sudo mount -t binder binder /dev/binderfs

          # 2. Start Redroid using 'memfd' and 'binderfs' mapping
          # We map the host's binderfs directly into the container
          sudo docker run -itd --rm --privileged \
            --pull always \
            -v /dev/binderfs:/dev/binderfs \
            -v ~/data:/data \
            -p 5555:5555 \
            -p 5900:5900 \
            redroid/redroid:11.0.0-latest \
            androidboot.redroid_width=720 \
            androidboot.redroid_height=1280 \
            androidboot.redroid_fps=30 \
            androidboot.use_memfd=true \
            redroid.vncserver=1

      - name: Status Info
        run: |
          $tsIP = tailscale ip -4
          echo "=========================================="
          echo "SUCCESS! ANDROID IS BOOTING"
          echo "TAILSCALE IP: $tsIP"
          echo "VNC PORT: 5900"
          echo "=========================================="
          while true; do sleep 60; done

