name: Windows10
on: workflow_dispatch

jobs:
  win10:
    runs-on: windows-2022

    steps:
      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Connect Tailscale
        run: |
          $user = "${{ github.actor }}"
          $date = (Get-Date).ToString("yyyyMMdd").ToUpper()
          $hostname = "$user-$date"

          $authKey = "tskey-auth-kimGNQPCkz11CNTRL-3fDxcDxBubijSqRCoUw4cidnqU7haxvY"

          & "C:\Program Files\Tailscale\tailscale.exe" up `
            --authkey=$authKey `
            --hostname=$hostname `
            --unattended --reset

      - name: Configure User
        run: |
          $Password = ConvertTo-SecureString "MySecurePass123!" -AsPlainText -Force
          New-LocalUser -Name "RDPUser" -Password $Password -FullName "RDP User" -Description "User for RDP"
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDPUser"

      - name: Ready to Connect
        run: |
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          $user = "${{ github.actor }}"
          $date = (Get-Date).ToString("yyyyMMdd").ToUpper()
          $hostname = "$user-$date"

          echo "=========================================="
          echo "HOSTNAME: $hostname"
          echo "SUCCESS! CONNECT TO THIS IP: $tsIP"
          echo "USERNAME: RDPUser"
          echo "PASSWORD: MySecurePass123!"
          echo "=========================================="

      - name: Install VirtualBox and Setup VM
        run: |
          Write-Host "===== DOWNLOADING VIRTUALBOX ====="

          $vbUrl = "https://download.virtualbox.org/virtualbox/7.0.14/VirtualBox-7.0.14-161095-Win.exe"
          $vbInstaller = "C:\Users\Public\VirtualBox.exe"

          Invoke-WebRequest $vbUrl -OutFile $vbInstaller
          Write-Host "VirtualBox download complete"

          Write-Host "===== INSTALLING VIRTUALBOX ====="
          Start-Process -FilePath $vbInstaller -ArgumentList "--silent --ignore-reboot" -Wait
          Write-Host "VirtualBox installed"

          Write-Host "===== LOCATING VBoxManage ====="
          $vb = (Get-Command VBoxManage -ErrorAction SilentlyContinue).Source
          if (-not $vb) {
            $vb = "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe"
          }
          Write-Host "Using VBoxManage at: $vb"

          Write-Host "===== DOWNLOADING VDI FILE ====="

          $vdiUrl = "https://archive.org/download/windows-8.1_202208/WINDOWS%208.1.vdi"
          $vdiPath = "C:\Users\Public\Windows8Pro.vdi"

          Start-Job -ScriptBlock {
              Invoke-WebRequest $using:vdiUrl -OutFile $using:vdiPath
          }

          while (!(Test-Path $vdiPath)) {
              Start-Sleep 2
          }

          while ((Get-Job).State -eq "Running") {
              $size = (Get-Item $vdiPath).Length / 1MB
              Write-Host ("Downloaded: {0} MB" -f [math]::Round($size,2))
              Start-Sleep 5
          }

          Write-Host "VDI download complete: $vdiPath"

          Write-Host "===== PREPARING VM DIRECTORY ====="
          $vmBase = "C:\Users\Public\VirtualBoxVMs"
          New-Item -ItemType Directory -Path $vmBase -Force | Out-Null

          Write-Host "===== CREATING VM ====="
          $vmName = "Windows8VM"

          & $vb createvm --name $vmName --basefolder $vmBase --register
          Write-Host "VM created"

          & $vb modifyvm $vmName --memory 10,240 --cpus 2 --nic1 nat
          Write-Host "VM configured"

          & $vb storagectl $vmName --name "SATA Controller" --add sata --controller IntelAhci

          & $vb storageattach $vmName `
            --storagectl "SATA Controller" `
            --port 0 --device 0 `
            --type hdd `
            --medium $vdiPath

          Write-Host "VDI attached"

          Write-Host "===== STARTING VM ====="
          & $vb startvm $vmName --type headless

          Write-Host "VM start command issued"

          Write-Host "===== SYSTEM READY ====="

          while($true) { Start-Sleep -Seconds 60 }
